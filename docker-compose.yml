version: '3.8'

services:
  backend:
    build:
      context: ./mithaly-backend
      dockerfile: Dockerfile
    container_name: mithaly-backend
    ports:
      - "5000:5000"
    volumes:
      - backend-uploads:/app/uploads
    environment:
      - NODE_ENV=production
      - PORT=5000
      - DATABASE_URL=postgresql://postgres:4nm9ev2razdazuhf@ahmed-ad-5ralvg:5432/postgres
      - OPENROUTER_API_KEY=${OPENROUTER_API_KEY}
      - JWT_SECRET=mithaly-secret-key-123
    healthcheck:
      test: ["CMD", "wget", "--spider", "-q", "http://localhost:5000/"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s
    restart: unless-stopped

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: mithaly-app
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - BACKEND_URL=https://ahmed-api.red-gate.tech
      - NEXT_PUBLIC_API_URL=https://ahmed-api.red-gate.tech
    depends_on:
      - backend
    restart: unless-stopped

volumes:
  backend-uploads:
